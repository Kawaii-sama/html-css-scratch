<style>
    .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        height: 36px;
        width: 105px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;
    }

    .subscribe-button:hover{
        opacity: 0.8;
    }

    .subscribe-button:focus{
        opacity: 0.4;
    }
</style>

<button class="subscribe-button">
    SUBSCRIBE
</button>


<style>
    .join-button{
        background-color: rgba(255, 255, 255);
        color:rgb(8, 124, 163);
        height: 36px;
        width: 65px;
        border-color:rgb(8, 124, 163);
        border-radius: 2px;
        border-style: solid;
        border-width: 1px;
        cursor: pointer;
        margin-right: 5px;
        transition: background-color 1s, color 1s;
        }

    .join-button:hover{
        background-color:rgb(8, 124, 163);
        color:white;
        border-color:white;
    }
    .join-button:active{
        opacity: 0.7;
    }

</style>

<button class="join-button">
    JOIN
</button>



<style>
    .tweet-button{
        background-color:rgb(5, 159, 225);
        color: white;
        height: 36px;
        width: 74px;
        border: none;
        border-radius: 18px;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;

    }

    .tweet-button:hover {
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
        }

</style>


<button class="tweet-button">
    Tweet
</button>
