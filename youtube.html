<!DOCTYPE html>
<html>
    <head>
        <title>Youtube Clone</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <style>

            p{
                font-family: Roboto, Arial;
            }


            .thumbu{
                width: 300px;
                display: block;
            }

            .thumbu2{
                width: 300px;

            }

            .searchBar{
                display: block;
            }


            .preview{
                width : 300px;
                display: inline-block;
                vertical-align: top;
                margin-right: 20px;
            }

            .channelpic {
                width: 50px;
                border-radius: 50%;
                object-position: center;
                display: inline-block;
                vertical-align: top;
            }

            .pfp{
                width: 40px;
                border-radius: 50%;
                object-position: top;
            }

            .vidinfo{
                display: inline-block;
                width: 200px;
                vertical-align: top;
            }

            .title{
                margin-top: 0px;
                margin-bottom: 0px;
                font-size: 14px;
                font-weight: 500;
            }

            .thumbnailRow{
                margin-bottom: 10px;
            }
        </style>
    </head>
    <body>
        <input class="searchBar" type="text" placholder="Search">

        <div class="preview">
            <div class="thumbnailRow">
                <div> <img class="thumbu" src="thumbnails/thumbnail-1.webp"> </div>
            </div>
                <div>
                    <div class="channelpic"> <img class="pfp" src="channel/channel-1.jpeg" > </div>
                        <div class="vidinfo">
                            <p class="title">Talking tech and AI with Google CEO Sundar Pichai!</p>
                            <p class="publisher"> Marques Brownlee &check;</p>
                            <p class="stats"> 3.4M views &middot; 6 months ago</p>
                        </div>
                </div>
        </div>

        <div class="preview">
        <img class="thumbu2" src="thumbnails/thumbnail-2.webp">
        <p class="title"> Try Not To Laugh Challenge #9 </p>
        <p class="publisher"> Markiplier &check;</p>
        <p class="stats"> 19M views &middot; 4 years ago</p>
        </div>

    </body>
</html>
